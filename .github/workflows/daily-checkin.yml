name: Daily LitMedia Check-in

on:
  schedule:
    # GitHub Actions uses UTC.
    # 21:05 UTC is 05:05 in Asia/Taipei.
    # 09:05 UTC is 17:05 in Asia/Taipei.
    - cron: "5 21 * * *"
    - cron: "5 9 * * *"
  workflow_dispatch:

jobs:
  checkin:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run daily check-in
        env:
          LITMEDIA_STORAGE_STATE_BASE64: ${{ secrets.LITMEDIA_STORAGE_STATE_BASE64 }}
          LITMEDIA_URL: ${{ vars.LITMEDIA_URL }}
        run: npm run checkin

      - name: Upload failure screenshot
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: litmedia-checkin-failure
          path: test-results/checkin-failure.png
          if-no-files-found: ignore
